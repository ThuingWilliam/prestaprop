<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Elite | PrestaPro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4361ee;
            --accent: #4cc9f0;
            --sidebar-bg: #0f172a;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 50px;
            width: 100%;
            max-width: 440px;
            color: white;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            position: relative;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            z-index: -1;
            border-radius: 34px;
            opacity: 0.3;
        }

        .brand-logo {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--accent);
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: -1px;
        }

        .form-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: rgba(255,255,255,0.5);
            margin-bottom: 10px;
            display: block;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 14px 20px;
            border-radius: 16px;
            font-weight: 500;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
            color: white;
            box-shadow: 0 0 15px rgba(76, 201, 240, 0.2);
        }

        .btn-elite {
            background: var(--primary);
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            color: white;
            font-weight: 700;
            padding: 16px;
            border-radius: 16px;
            margin-top: 20px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-elite:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px var(--primary);
            opacity: 0.9;
        }
        
        .floating-circles {
            position: absolute;
            z-index: -1;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }
        
        .circle {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            filter: blur(100px);
            opacity: 0.2;
        }
    </style>
</head>
<body>
    <div class="circle" style="width: 400px; height: 400px; top: -100px; right: -100px;"></div>
    <div class="circle" style="width: 300px; height: 300px; bottom: -50px; left: -100px; background: #ef476f;"></div>

    <div class="login-card">
        <div class="brand-logo">
            <i class="fa-solid fa-gem"></i>
            <div>PrestaPro</div>
        </div>
        
        <h4 class="text-center mb-4" style="font-weight: 300;">Bienvenido al Sistema Elite</h4>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category if category != 'error' else 'danger' }} border-0 bg-white bg-opacity-10 text-white small rounded-4 mb-4">
                  <i class="fa-solid fa-circle-info me-2"></i>{{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Usuario de Acceso</label>
                <input type="text" name="username" class="form-control" placeholder="Ingrese su usuario..." required>
            </div>
            <div class="mb-4">
                <label class="form-label">Clave de Seguridad</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-elite w-100">Autenticar Entrada</button>
        </form>
        
        <div class="mt-5 text-center text-white-50 small">
            <i class="fa-solid fa-shield-halved me-1"></i> Conexión Protegida SSL
        </div>
    </div>
</body>
</html>
