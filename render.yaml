services:
  - type: web
    name: prestapro
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: FLASK_DEBUG
        value: "false"
      - key: PORT
        value: "10000"
